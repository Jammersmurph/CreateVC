name: Export & Publish

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pack.toml
        id: version
        run: |
          VERSION=$(grep '^version =' pack.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=Modpacks" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Download mods to cache
        run: packwiz update --all --yes

      - name: Add CurseForge metadata (CFWidget, no key needed)
        run: python3 add-cf-metadata.py

      - name: Export to CurseForge
        run: packwiz cf export -o CreateVC.zip

      - name: Export to Modrinth
        run: packwiz mr export -o CreateVC.mrpack

      - name: Upload to Modrinth
        if: startsWith(github.ref, 'refs/tags/')
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          curl -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data={\"name\":\"$VERSION\",\"version_number\":\"$VERSION\",\"dependencies\":[],\"game_versions\":[\"1.21.1\"],\"version_type\":\"release\",\"loaders\":[\"neoforge\"],\"featured\":true,\"status\":\"listed\",\"project_id\":\"createvc-server\",\"file_parts\":[\"file\"]};type=application/json" \
            -F "file=@CreateVC.mrpack"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CreateVC-Exports
          path: |
            CreateVC.mrpack
            CreateVC.zip
          compression-level: 0

      - name: Update Modpacks release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag_name }}
          allowUpdates: true
          omitBody: true
          omitName: true
          omitPrerelease: true
          replacesArtifacts: true
          artifacts: "CreateVC.zip,CreateVC.mrpack"
          token: ${{ secrets.GITHUB_TOKEN }}
