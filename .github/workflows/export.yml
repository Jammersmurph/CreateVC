name: Export & Publish

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pack.toml
        id: version
        run: |
          VERSION=$(grep '^version =' pack.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=Modpacks" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Exclude updater-managed files from Modrinth export
        run: |
          mkdir -p /tmp/createvc-export-excluded

          # FTB Library is installed by the CreateVC updater because it cannot be
          # referenced by the Modrinth pack export.
          mv mods/ftb-library-forge.pw.toml /tmp/createvc-export-excluded/

          # These are first-install-only files managed by the CreateVC updater.
          # Keeping them out of the .mrpack prevents Modrinth App updates from
          # replacing player-local settings before the updater can preserve them.
          for path in \
            config \
            servers.dat \
            servers.dat_old
          do
            if [ -e "$path" ]; then
              mv "$path" /tmp/createvc-export-excluded/
            fi
          done

          # Restore pack-managed configs that should ship with every install.
          git checkout config/fml.toml
          git checkout config/simple-custom-early-loading.json
          git checkout config/simple-custom-early-loading/

      - name: Export to Modrinth
        run: packwiz mr export -o CreateVC.mrpack

      - name: Sanity check - no unexpected override mods
        run: |
          ALLOWED_OVERRIDES="\
            overrides/mods/CreateVC-Core-
            overrides/mods/createsa_tank_fix-
            overrides/mods/createvc_updater_
            client-overrides/mods/\
          "
          FAILED=0
          while IFS= read -r entry; do
            allowed=false
            for pattern in $ALLOWED_OVERRIDES; do
              case "$entry" in
                *"$pattern"*) allowed=true; break;;
              esac
            done
            if [ "$allowed" = false ]; then
              echo "UNEXPECTED OVERRIDE: $entry"
              FAILED=1
            fi
          done < <(unzip -l CreateVC.mrpack 2>/dev/null \
            | awk '{print $4}' \
            | grep -E 'overrides/mods/|client-overrides/mods/')
          if [ "$FAILED" = 1 ]; then
            echo ""
            echo "ERROR: Unexpected override mods found in mrpack."
            echo "Move them to Modrinth metadata in their .pw.toml to fix this."
            exit 1
          fi
          echo "Override mods check passed."

      - name: Upload to Modrinth & set server pack version
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          RESPONSE=$(curl -s -X POST https://api.modrinth.com/v2/version \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data={\"name\":\"$VERSION\",\"version_number\":\"$VERSION\",\"dependencies\":[],\"game_versions\":[\"1.21.1\"],\"version_type\":\"release\",\"loaders\":[\"neoforge\"],\"featured\":true,\"status\":\"listed\",\"project_id\":\"BpnBfkpK\",\"file_parts\":[\"file\"]};type=application/json" \
            -F "file=@CreateVC.mrpack")
          echo "Upload response: $RESPONSE"
          VERSION_ID=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['id'])" 2>/dev/null || true)
          if [ -n "$VERSION_ID" ]; then
            curl -s -X PATCH "https://api.modrinth.com/v3/project/BpnBfkpK" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"minecraft_java_server\":{\"content\":{\"kind\":\"modpack\",\"version_id\":\"$VERSION_ID\"}}}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CreateVC-Exports
          path: CreateVC.mrpack
          compression-level: 0

      - name: Update Modpacks release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag_name }}
        run: |
          gh release upload "$TAG" CreateVC.mrpack --clobber || \
            gh release create "$TAG" CreateVC.mrpack --title "$TAG" --generate-notes
