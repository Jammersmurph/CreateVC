name: Build and Release Modpacks

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Build mrpack (Modrinth)
        run: packwiz modrinth export -o CreateVC-auto-update-must-README.mrpack

      - name: Build auto-update zip (Prism/ATLauncher)
        run: packwiz export -o CreateVC-auto-update.zip

      - name: Build manual-update zip
        run: packwiz export -o CreateVC-man-update.zip

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v2.7 \
            CreateVC-auto-update-must-README.mrpack \
            CreateVC-auto-update.zip \
            CreateVC-man-update.zip \
            --clobber -R Jammersmurph/CreateVC
