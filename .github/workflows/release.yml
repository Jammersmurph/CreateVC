name: Publish to Modrinth

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Build mrpack
        run: packwiz modrinth export -o CreateVC.mrpack

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          curl -s -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F 'data={"project_id":"GkzCDACV","name":"CreateVC ${{ github.run_number }}","version_number":"1.0.${{ github.run_number }}","changelog":"Updated modpack","dependencies":[],"game_versions":["1.21.1"],"version_type":"release","loaders":["neoforge"],"featured":true,"file_parts":["file"]}' \
            -F "file=@CreateVC.mrpack;type=application/zip"
