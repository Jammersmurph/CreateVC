name: Update Manual Pack

on:
  push:
    branches:
      - main
    paths:
      - 'index.toml'
      - 'pack.toml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Build manual-update zip
        run: packwiz curseforge export -o CreateVC-man-update.zip

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v2.7 CreateVC-man-update.zip --clobber -R Jammersmurph/CreateVC
