name: Export Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Exclude updater-managed files from export
        run: |
          mkdir -p /tmp/createvc-export-excluded

          mv mods/ftb-library-forge.pw.toml /tmp/createvc-export-excluded/

          for path in \
            config \
            options.txt \
            optionsof.txt \
            servers.dat \
            servers.dat_old
          do
            if [ -e "$path" ]; then
              mv "$path" /tmp/createvc-export-excluded/
            fi
          done

          git checkout config/fml.toml
          git checkout config/simple-custom-early-loading.json
          git checkout config/simple-custom-early-loading/

      - name: Export to mrpack
        run: packwiz mr export -o CreateVC.mrpack

      - name: Sanity check - options defaults are updater-only
        run: |
          if unzip -l CreateVC.mrpack | awk '{print $4}' | grep -Eq '^overrides/options(of)?\.txt$'; then
            echo "ERROR: options.txt/optionsof.txt must not ship in the mrpack."
            exit 1
          fi
          grep -Eq '^[[:space:]]*file = "options\.txt"[[:space:]]*$' index.toml
          if grep -Eq '^[[:space:]]*options(of)?\.txt[[:space:]]*$' createvc-overwrite-allowlist.txt; then
            echo "ERROR: options.txt/optionsof.txt must never be updater-overwritable."
            exit 1
          fi
          echo "Options updater-only check passed."

      - name: Sanity check - no unexpected override mods
        run: |
          ALLOWED_OVERRIDES="\
            overrides/mods/CreateVC-Core-
            overrides/mods/createsa_tank_fix-
            overrides/mods/createvc_updater_
            client-overrides/mods/\
          "
          FAILED=0
          while IFS= read -r entry; do
            allowed=false
            for pattern in $ALLOWED_OVERRIDES; do
              case "$entry" in
                *"$pattern"*) allowed=true; break;;
              esac
            done
            if [ "$allowed" = false ]; then
              echo "UNEXPECTED OVERRIDE: $entry"
              FAILED=1
            fi
          done < <(unzip -l CreateVC.mrpack 2>/dev/null \
            | awk '{print $4}' \
            | grep -E 'overrides/mods/|client-overrides/mods/')
          if [ "$FAILED" = 1 ]; then
            echo ""
            echo "ERROR: Unexpected override mods found in mrpack."
            echo "Move them to Modrinth metadata in their .pw.toml to fix this."
            exit 1
          fi
          echo "Override mods check passed."

      - name: Copy mrpack into repo
        run: |
          mkdir -p builds
          cp CreateVC.mrpack builds/CreateVC-dev.mrpack

      - name: Push mrpack to dev branch
        run: |
          git config user.name "CreateVC Dev CI"
          git config user.email "actions@github.com"
          git add -f builds/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "update dev build [skip ci]"
          git push
